<svg xmlns="http://www.w3.org/2000/svg" width="1438" height="1115" viewBox="0 0 1438 1115" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14">
<rect width="1438" height="1115" rx="10" fill="#15171f"/>
<rect width="1438" height="30" rx="10" fill="#22252f"/>
<rect y="18" width="1438" height="12" fill="#22252f"/>
<circle cx="18" cy="15" r="5" fill="#ff5f56"/><circle cx="36" cy="15" r="5" fill="#ffbd2e"/><circle cx="54" cy="15" r="5" fill="#27c93f"/>
<text x="719" y="19" fill="#7d8294" font-size="12" text-anchor="middle">bash demo/run.sh — harness-demo</text>
<text x="18" y="46" fill="#e6e6ee" font-weight="700" opacity="0">An AI agent opened a PR. Should it merge UNATTENDED — past the human gate?<animate attributeName="opacity" from="0" to="1" begin="0.0s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="65" fill="#e6e6ee" font-weight="400" opacity="0">   The verdict core decides. It emits MERGE only when EVERY gate is satisfied.<animate attributeName="opacity" from="0" to="1" begin="0.16s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="84" fill="#ff6b6b" font-weight="400" opacity="0">   Anything ambiguous → BLOCK (a human merges). Disabled → NOOP. Fail-closed by design.<animate attributeName="opacity" from="0" to="1" begin="0.32s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="103" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="0.48s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="141" fill="#9ecbff" font-weight="700" opacity="0">1. Everything is green — clean CI, PASS review, independent oracle accepts.<animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="160" fill="#3ddc84" font-weight="400" opacity="0">   → exit 0   MERGE<animate attributeName="opacity" from="0" to="1" begin="0.96s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="179" fill="#3ddc84" font-weight="400" opacity="0">   ✅ MERGE. This is the only path to an unattended merge.<animate attributeName="opacity" from="0" to="1" begin="1.12s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="198" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="1.28s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="236" fill="#9ecbff" font-weight="700" opacity="0">2. The agent&#x27;s tests are failing. (gate 2: required CI checks)<animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="255" fill="#ff6b6b" font-weight="400" opacity="0">   → exit 1   BLOCK check &#x27;tests&#x27;=failure (not success)<animate attributeName="opacity" from="0" to="1" begin="1.76s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="274" fill="#ff6b6b" font-weight="400" opacity="0">   🛑 BLOCK. A red check is never a merge — and a MISSING check blocks too (rename guard).<animate attributeName="opacity" from="0" to="1" begin="1.92s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="293" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="2.08s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="331" fill="#9ecbff" font-weight="700" opacity="0">3. The PR touches a database migration. (gate 5: guarded path)<animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="350" fill="#ff6b6b" font-weight="400" opacity="0">   → exit 1   BLOCK touches guarded path(s): db/migrations/004_add_table.sql<animate attributeName="opacity" from="0" to="1" begin="2.56s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="369" fill="#ff6b6b" font-weight="400" opacity="0">   🛑 BLOCK. Schema/auth/permission changes ALWAYS get a human, no matter how green.<animate attributeName="opacity" from="0" to="1" begin="2.72s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="388" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="2.88s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="426" fill="#9ecbff" font-weight="700" opacity="0">4. A commit landed AFTER the reviewer looked. (gate 3b: diff_sha re-validation)<animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="445" fill="#ff6b6b" font-weight="400" opacity="0">   → exit 1   BLOCK diff_sha mismatch: reviewed bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb != head aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa (commit landed after review)<animate attributeName="opacity" from="0" to="1" begin="3.36s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="464" fill="#ff6b6b" font-weight="400" opacity="0">   🛑 BLOCK. The review is stale — it judged a different head. (Also kills a fabricated PASS:<animate attributeName="opacity" from="0" to="1" begin="3.52s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="483" fill="#e6e6ee" font-weight="400" opacity="0">      a planted verdict can&#x27;t carry the real head sha.)<animate attributeName="opacity" from="0" to="1" begin="3.68s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="502" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="3.84s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="540" fill="#9ecbff" font-weight="700" opacity="0">5. The PR edits the gate that is judging it. (gate 6: self-protection)<animate attributeName="opacity" from="0" to="1" begin="4.16s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="559" fill="#ff6b6b" font-weight="400" opacity="0">   → exit 1   BLOCK touches gate-defining file(s) — PR must not edit its own gate: core/verdict_core.sh<animate attributeName="opacity" from="0" to="1" begin="4.32s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="578" fill="#ff6b6b" font-weight="400" opacity="0">   🛑 BLOCK. A PR must not weaken its own gate to self-pass.<animate attributeName="opacity" from="0" to="1" begin="4.48s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="597" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="4.64s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="635" fill="#9ecbff" font-weight="700" opacity="0">6. The independent oracle (a DIFFERENT model) rejects. (gate 8)<animate attributeName="opacity" from="0" to="1" begin="4.96s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="654" fill="#ff6b6b" font-weight="400" opacity="0">   → exit 1   BLOCK independent oracle verdict=reject (human-merge required)<animate attributeName="opacity" from="0" to="1" begin="5.12s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="673" fill="#ff6b6b" font-weight="400" opacity="0">   🛑 BLOCK. Two models must agree. A blind spot in one is unlikely shared by the other.<animate attributeName="opacity" from="0" to="1" begin="5.28s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="692" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="5.44s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="730" fill="#9ecbff" font-weight="700" opacity="0">7. The oracle hasn&#x27;t run yet. (gate 8: pending)<animate attributeName="opacity" from="0" to="1" begin="5.76s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="749" fill="#ffd166" font-weight="400" opacity="0">   → exit 2   NOOP await-oracle (no independent oracle accept for this head yet)<animate attributeName="opacity" from="0" to="1" begin="5.92s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="768" fill="#ffd166" font-weight="400" opacity="0">   ⏸  NOOP await — the PR stays open, quiet, re-evaluated when the oracle posts.<animate attributeName="opacity" from="0" to="1" begin="6.08s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="787" fill="#ff6b6b" font-weight="400" opacity="0">      (But a pending oracle NEVER masks a real failure — green-but-awaiting + red CI = BLOCK.)<animate attributeName="opacity" from="0" to="1" begin="6.24s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="806" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="6.4s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="844" fill="#9ecbff" font-weight="700" opacity="0">8. This PR is a KNOWN false-pass we recorded. (gate 9: sentinel)<animate attributeName="opacity" from="0" to="1" begin="6.72s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="863" fill="#ff6b6b" font-weight="400" opacity="0">   → exit 1   BLOCK sentinel PR #352 (SENTINEL_PRS) — a recorded false-pass never auto-merges (gate-9)<animate attributeName="opacity" from="0" to="1" begin="6.88s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="882" fill="#ff6b6b" font-weight="400" opacity="0">   🛑 BLOCK. A recorded false-pass can NEVER auto-merge — even with every other gate green,<animate attributeName="opacity" from="0" to="1" begin="7.04s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="901" fill="#e6e6ee" font-weight="400" opacity="0">      even on a manual re-label. Honesty about your blind spots, encoded as a hard gate.<animate attributeName="opacity" from="0" to="1" begin="7.2s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="920" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="7.36s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="958" fill="#9ecbff" font-weight="700" opacity="0">9. Someone fed the gate garbage.<animate attributeName="opacity" from="0" to="1" begin="7.68s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="977" fill="#ff6b6b" font-weight="400" opacity="0">   → BLOCK unparseable-state-input<animate attributeName="opacity" from="0" to="1" begin="7.84s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="996" fill="#ff6b6b" font-weight="400" opacity="0">   🛑 BLOCK (fail-closed). An auto-merge gate must NEVER merge on unparseable input.<animate attributeName="opacity" from="0" to="1" begin="8.0s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="1015" fill="#3a3f52" font-weight="400" opacity="0">────────────────────────────────────────────────────────────<animate attributeName="opacity" from="0" to="1" begin="8.16s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="1053" fill="#e6e6ee" font-weight="700" opacity="0">That&#x27;s the whole idea: the burden of proof is on the MERGE, not on the human.<animate attributeName="opacity" from="0" to="1" begin="8.48s" dur="0.12s" fill="freeze"/></text>
<text x="18" y="1072" fill="#e6e6ee" font-weight="400" opacity="0">Run the fixtures to see all of it asserted:  bash tests/run.sh<animate attributeName="opacity" from="0" to="1" begin="8.64s" dur="0.12s" fill="freeze"/></text>
</svg>